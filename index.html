    <script>
        // Generador de Sonido "Tin-Tin" limpio mediante Web Audio API (Sin depender de archivos externos caídos)
        function playCoinSound() {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }
                
                const playTone = (freq, startTime, duration) => {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = 'sine';
                    osc.frequency.value = freq;
                    
                    gain.gain.setValueAtTime(0.15, audioCtx.currentTime + startTime); // Volumen bajito y agradable
                    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + startTime + duration);
                    
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    
                    osc.start(audioCtx.currentTime + startTime);
                    osc.stop(audioCtx.currentTime + startTime + duration);
                };

                // Notas estilo "tin-tin" clásico de moneda
                playTone(987.77, 0, 0.08);    // B5
                playTone(1318.51, 0.08, 0.25); // E6
            } catch(e) {
                console.log("Audio contextual activo");
            }
        }

        // Se reproduce suavemente al primer toque en la pantalla
        document.addEventListener('click', function initAudio() {
            playCoinSound();
            document.removeEventListener('click', initAudio);
        }, { once: true });
